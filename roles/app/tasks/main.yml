- name: Run Flask app container
  community.docker.docker_container:
    name: flask_app
    image: my_flask_image:latest
    state: started
    restart_policy: unless-stopped
    ports:
      - "5000:5000"
    networks:
      - name: dev_net
    env:
      DATABASE_URL: "postgresql://postgres:{{ db_password }}@postgres:5432/postgres"
