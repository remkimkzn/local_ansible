- name: Run Nginx container
  community.docker.docker_container:
    name: nginx
    image: nginx:latest
    state: started
    restart_policy: unless-stopped
    ports:
      - "80:80"
    networks:
      - name: dev_net
    volumes:
      - "{{ playbook_dir }}/../roles/nginx/files/default.conf:/etc/nginx/conf.d/default.conf:ro"
  tags:
    - nginx
